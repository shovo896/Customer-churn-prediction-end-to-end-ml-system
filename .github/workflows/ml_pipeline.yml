name: ML pipeline CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linter
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ --max-line-length=100 --ignore=E402

  ml-pipeline:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup DVC remote credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull data from DVC
        run: dvc pull

      - name: Run DVC pipeline
        run: dvc repro

      - name: Push updated data/models
        run: dvc push

      - name: Commit updated dvc.lock
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dvc.lock reports/
          git diff --staged --quiet || git commit -m "ci: update dvc.lock and reports [skip ci]"
          git push


## job check 
  api-test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: ml-pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start API in background
        run: |
          PORT=8001 python src/app.py &
          sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:8001/health || exit 1
          echo "✅ API is healthy!"

      - name: Test prediction endpoint
        run: |
          curl -X POST "http://localhost:8001/predict" \
               -H "Content-Type: application/json" \
               -d '{
                     "tenure": 12.0,
                     "MonthlyCharges": 65.5,
                     "TotalCharges": 786.0,
                     "SeniorCitizen": 0,
                     "gender": 1,
                     "Partner": 1,
                     "Dependents": 0,
                     "PhoneService": 1,
                     "PaperlessBilling": 1,
                     "charge_ratio": 0.083
                   }' | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'churn_prediction' in data
          assert 'churn_probability' in data
          print('✅ Prediction endpoint working!')
          print(json.dumps(data, indent=2, ensure_ascii=False))
          "