name: ML Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint source
        run: flake8 src --max-line-length=100 --ignore=E402

      - name: Verify Python syntax
        run: python -m compileall src

  api-smoke-test:
    runs-on: ubuntu-latest
    needs: code-quality
    env:
      DISABLE_REMOTE_MODEL: "1"
      PORT: "8001"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API
        run: nohup python src/app.py > api.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become healthy" >&2
          cat api.log || true
          exit 1

      - name: Test prediction endpoint
        run: |
          response=$(curl -fsS -X POST "http://127.0.0.1:8001/predict" \
            -H "Content-Type: application/json" \
            -d '{
              "tenure": 12.0,
              "MonthlyCharges": 65.5,
              "TotalCharges": 786.0,
              "SeniorCitizen": 0,
              "gender": 1,
              "Partner": 1,
              "Dependents": 0,
              "PhoneService": 1,
              "PaperlessBilling": 1,
              "charge_ratio": 0.083
            }')

          python -c "import json,sys; data=json.loads(sys.stdin.read()); assert 'churn_prediction' in data; assert 'churn_probability' in data; print(json.dumps(data, indent=2))" <<< "$response"

  secured-dvc-pipeline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: code-quality
    env:
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Check secured secrets
        id: secret_check
        run: |
          if [ -z "$DAGSHUB_USERNAME" ] || [ -z "$DAGSHUB_TOKEN" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "DAGSHUB secrets are missing. Skipping secured DVC pipeline."
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.secret_check.outputs.has_secrets == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        if: steps.secret_check.outputs.has_secrets == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.secret_check.outputs.has_secrets == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure DVC credentials for DagsHub S3 remote
        if: steps.secret_check.outputs.has_secrets == 'true'
        run: |
          dvc remote modify dagshub --local access_key_id "$DAGSHUB_USERNAME"
          dvc remote modify dagshub --local secret_access_key "$DAGSHUB_TOKEN"

      - name: Pull DVC data
        if: steps.secret_check.outputs.has_secrets == 'true'
        run: dvc pull

      - name: Run DVC pipeline
        if: steps.secret_check.outputs.has_secrets == 'true'
        run: dvc repro

      - name: Push DVC artifacts
        if: steps.secret_check.outputs.has_secrets == 'true'
        run: dvc push

      - name: Upload evaluation artifacts
        if: always() && steps.secret_check.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: evaluation_results/
          if-no-files-found: ignore
